services:
  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=CollabWorld API
      - APP_ENV=development
      - API_PREFIX=/api/v1
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/collabworld
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=collabworld
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - collabworld_postgres_data:/var/lib/postgresql/data

volumes:
  collabworld_postgres_data:
